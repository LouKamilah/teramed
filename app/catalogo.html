<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeraMED | Catálogo de Insumos Médicos</title>
    <link href="./src/css/output.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script src="./src/js/catalogo.js"></script>
    <!--FAV ICON-->
    <link rel="icon" type="image/x-icon" href="./src/img/logo.png" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />
    <style>
        .inter {
            font-family: "Inter", serif;
            font-weight: 400;
            font-style: normal;
        }
    </style>
</head>

<body class="inter antialiased bg-[#0d0e11] text-white">
    <div id="header-placeholder"></div>


    <script>
        function cargarHTML(url, idElemento, callback, metodo = "innerHTML") {
            fetch(url)
                .then((res) => res.text())
                .then((data) => {
                    document.getElementById(idElemento)[metodo] = data;
                    if (callback) callback();
                });
        }

        cargarHTML("components/header.html", "header-placeholder", initMenu, "outerHTML");
        cargarHTML("components/footer.html", "footer-placeholder", null, "outerHTML");

        function initMenu() {
            const toggleBtn = document.getElementById("menu-toggle-btn");
            const mobileMenu = document.getElementById("mobile-menu");
            const menuIcon = document.getElementById("menu-icon");

            toggleBtn.addEventListener("click", () => {
                mobileMenu.classList.toggle("hidden");
                const isOpen = !mobileMenu.classList.contains("hidden");

                toggleBtn.setAttribute("aria-expanded", isOpen);
                menuIcon.classList.toggle("bi-list", !isOpen);
                menuIcon.classList.toggle("bi-x", isOpen);
            });

            mobileMenu.querySelectorAll("a").forEach((link) => {
                link.addEventListener("click", () => {
                    mobileMenu.classList.add("hidden");
                    menuIcon.classList.remove("bi-x");
                    menuIcon.classList.add("bi-list");
                    toggleBtn.setAttribute("aria-expanded", "false");
                });
            });
        }
    </script>

    <section x-data="catalogo()" x-init="init()" class="px-8 py-16">

        <div class="mx-auto max-w-7xl">

            <div class="flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">

                <div>

                    <h1 class="text-5xl font-bold">
                        Catálogo completo
                    </h1>

                    <p class="mt-3 text-white/70">
                        Explora todos nuestros productos organizados por categorías.
                    </p>

                </div>

                <input x-model="busqueda" type="text" placeholder="Buscar producto..."
                    class="rounded-xl bg-white/5 border border-white/10 px-5 py-3 w-full lg:w-96">

            </div>

            <div class="mt-10 flex flex-wrap gap-3">

                <button @click="categoriaActiva='todos'" :class="categoriaActiva=='todos'
                ? 'bg-[#d86f6f] text-black'
                : 'bg-white/5 border border-white/10'" class="rounded-full px-5 py-2">

                    Todos

                </button>

                <template x-for="categoria in categorias" :key="categoria.id">

                    <button @click="categoriaActiva=categoria.slug" x-text="categoria.nombre" :class="categoriaActiva==categoria.slug
                    ? 'bg-[#d86f6f] text-black'
                    : 'bg-white/5 border border-white/10'" class="rounded-full px-5 py-2">

                    </button>

                </template>

            </div>

            <div class="mt-12 grid gap-7 sm:grid-cols-2 xl:grid-cols-4">

                <template x-for="producto in productosFiltrados" :key="producto.id">

                    <article
                        class="rounded-3xl bg-white/5 border border-white/10 overflow-hidden transition hover:scale-[1.02]">

                        <img :src="producto.imagen_url || './src/img/no-image.png'" :alt="producto.nombre"
                            class="h-60 w-full object-cover">

                        <div class="p-5">

                            <p class="text-xs uppercase tracking-widest text-[#d86f6f]"
                                x-text="producto.categoria.nombre">

                            </p>

                            <h2 class="mt-2 text-xl font-semibold" x-text="producto.nombre">

                            </h2>

                            <p class="mt-3 text-sm text-white/70 line-clamp-3" x-text="producto.descripcion">

                            </p>

                            <div class="mt-5 flex items-center justify-between">

                                <span class="text-2xl font-bold text-[#d86f6f]" x-text="precio(producto.precio)">

                                </span>

                            </div>

                            <a :href="linkWhatsapp(producto.nombre)" target="_blank"
                                class="mt-6 block rounded-xl bg-[#d86f6f] py-3 text-center font-semibold text-black hover:bg-[#e89a9a]">

                                Cotizar por WhatsApp

                            </a>

                        </div>

                    </article>

                </template>

            </div>

            <div x-show="!cargando && productosFiltrados.length==0" class="text-center py-20 text-white/60">

                No se encontraron productos.

            </div>

        </div>

    </section>

</body>

</html>
